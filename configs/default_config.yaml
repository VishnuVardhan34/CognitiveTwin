# CognitiveTwin Configuration
project:
  name: CognitiveTwin
  version: "1.0.0"

data:
  deap_dir: "./datasets/DEAP"
  seediv_dir: "./datasets/SEED-IV"
  drozy_dir: "./datasets/DROZY"

eeg:
  sfreq: 128
  n_channels: 32
  bandpass_low: 0.5
  bandpass_high: 45.0
  n_freqs: 64
  ica_components: 14

eye_tracking:
  sfreq: 120
  velocity_threshold: 30.0
  ear_threshold: 0.2
  n_features: 7

hrv:
  sfreq: 128
  window_sec: 30.0
  step_sec: 5.0
  n_features: 10

model:
  eeg_embedding_dim: 64
  eye_embedding_dim: 64
  hrv_embedding_dim: 32
  fused_dim: 64
  n_classes: 4
  class_names: ["Underload", "Optimal", "Overload", "Fatigue"]
  dropout: 0.3
  cross_attn_heads: 4
  initial_decision_weights: [0.5, 0.2, 0.2, 0.1]

training:
  seed: 42
  batch_size: 32
  epochs: 50
  pretrain_epochs: 30
  learning_rate: 0.0005
  weight_decay: 0.0001
  grad_clip_norm: 1.0
  scheduler: "cosine_warm_restarts"
  scheduler_T0: 10
  scheduler_Tmult: 2

ukf:
  state_dim: 4
  alpha: 0.001
  beta: 2.0
  kappa: 0.0
  process_noise: 0.01
  observation_noise: 0.05

pipeline:
  update_interval_ms: 500
  max_latency_ms: 200
  trajectory_buffer_sec: 30

server:
  host: "localhost"
  port: 8765

evaluation:
  target_accuracy: 0.85
  target_latency_ms: 200
  loso_subjects: 32
